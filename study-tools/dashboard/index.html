<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="../engine/vendor/font-awesome.min.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <h1><i class="fas fa-chalkboard-teacher"></i> Teacher Dashboard</h1>
            <p class="login-subtitle">Sign in to view student progress</p>
            <form id="login-form" onsubmit="event.preventDefault(); Dashboard.login(this.email.value, this.password.value);">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="teacher@school.edu">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Password">
                </div>
                <div id="login-error" class="login-error hidden"></div>
                <div id="login-success" class="login-success hidden"></div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
                <p class="forgot-password"><a href="#" onclick="event.preventDefault(); Dashboard.resetPassword();">Forgot password?</a></p>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard hidden">
        <header class="dashboard-header">
            <div class="dashboard-header-left">
                <h1><i class="fas fa-chalkboard-teacher"></i> Teacher Dashboard</h1>
                <span class="dashboard-version" id="dashboard-version"></span>
            </div>
            <button class="btn btn-logout" onclick="Dashboard.logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </header>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <div class="filter-group">
                <label for="filter-class">Class</label>
                <select id="filter-class">
                    <option value="">All Classes</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filter-unit">Unit</label>
                <select id="filter-unit">
                    <option value="">All Units</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filter-date-start">From</label>
                <input type="date" id="filter-date-start">
            </div>
            <div class="filter-group">
                <label for="filter-date-end">To</label>
                <input type="date" id="filter-date-end">
            </div>
            <button class="btn btn-primary btn-filter" onclick="Dashboard.applyFilters()">
                <i class="fas fa-filter"></i> Apply
            </button>
        </div>

        <!-- Tab Navigation -->
        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="overview" onclick="Dashboard.switchTab('overview')">
                <i class="fas fa-chart-pie"></i> Overview
            </button>
            <button class="tab-btn" data-tab="students" onclick="Dashboard.switchTab('students')">
                <i class="fas fa-users"></i> Students
            </button>
            <button class="tab-btn" data-tab="units" onclick="Dashboard.switchTab('units')">
                <i class="fas fa-chart-bar"></i> Activity Usage
            </button>
            <button class="tab-btn" data-tab="classes" onclick="Dashboard.switchTab('classes')">
                <i class="fas fa-key"></i> Class Codes
            </button>
            <button class="tab-btn" data-tab="scores" onclick="Dashboard.switchTab('scores')">
                <i class="fas fa-trophy"></i> Scores
            </button>
            <button class="tab-btn" data-tab="vocab" onclick="Dashboard.switchTab('vocab')">
                <i class="fas fa-brain"></i> Vocab Insights
            </button>
            <button class="tab-btn" data-tab="leaderboard" onclick="Dashboard.switchTab('leaderboard')">
                <i class="fas fa-medal"></i> Leaderboard
            </button>
        </nav>

        <!-- Tab Content -->
        <div id="tab-overview" class="tab-content active">
            <div id="overview-stats" class="stats-grid"></div>
            <div class="overview-panels">
                <div id="overview-trend" class="overview-panel"></div>
                <div id="overview-feed" class="overview-panel"></div>
            </div>
            <div id="overview-class-lb"></div>
            <div id="overview-rankings-viz"></div>
            <div id="overview-replay"></div>
            <div id="overview-leaderboard"></div>
        </div>

        <div id="tab-students" class="tab-content">
            <div id="students-table-container"></div>
        </div>

        <div id="tab-units" class="tab-content">
            <div id="units-chart-container"></div>
        </div>

        <div id="tab-classes" class="tab-content">
            <div id="classes-container"></div>
        </div>

        <div id="tab-scores" class="tab-content">
            <div id="scores-container"></div>
        </div>

        <div id="tab-vocab" class="tab-content">
            <div id="vocab-container"></div>
        </div>

        <div id="tab-leaderboard" class="tab-content">
            <div id="leaderboard-container"></div>
        </div>

        <!-- Student Edit Modal -->
        <div id="student-edit-modal" class="modal-overlay hidden">
            <div class="modal-card">
                <div class="modal-card-header">
                    <h3>Edit Student</h3>
                    <button class="btn-close-modal" onclick="Dashboard.closeStudentModal()"><i class="fas fa-times"></i></button>
                </div>
                <div class="modal-card-body" id="student-edit-body"></div>
            </div>
        </div>
    </div>

    <script src="../engine/vendor/supabase-js.min.js"></script>
    <script id="supabase-config">
        // Replace these with your Supabase project values
        const SUPABASE_URL = 'https://opfzhgqbaomakovocpeb.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_sFGHZl9kkwDmL1VA2cINdQ_UQI6urlK';
    </script>
    <script src="rankings-viz.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
