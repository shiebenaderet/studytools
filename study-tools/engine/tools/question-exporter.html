<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Question Export Tool</title>
<style>
  :root { --bg:#f7f5f0; --card:#fff; --ink:#2a2a2a; --muted:#666; --accent:#7A1F1F; --line:#d8d2c4; --ok:#2F855A; --warn:#C05621; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; background:var(--bg); color:var(--ink); padding:24px; }
  h1 { margin:0 0 4px; font-size:1.4em; }
  .sub { color:var(--muted); margin-bottom:20px; font-size:.9em; }
  .toolbar { display:flex; flex-wrap:wrap; gap:12px; align-items:center; background:var(--card); padding:14px 16px; border-radius:10px; margin-bottom:16px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
  select, button, input { font:inherit; }
  select, button { padding:8px 14px; border:1px solid var(--line); border-radius:6px; background:#fff; cursor:pointer; }
  button.primary { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .count { color:var(--muted); font-size:.9em; }
  .chapter { margin-bottom:14px; }
  .chapter h2 { font-size:1em; margin:12px 0 6px; color:var(--accent); }
  .chapter-head { display:flex; align-items:center; gap:6px; }
  .chapter-head input[type=checkbox] { cursor:pointer; }
  .qrow { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:10px 12px; margin-bottom:6px; }
  .qhead { display:flex; gap:10px; align-items:flex-start; }
  .qhead input[type=checkbox] { margin-top:4px; }
  .qtext { flex:1; }
  .badge { font-size:.7em; font-weight:700; color:#fff; background:var(--warn); border-radius:4px; padding:1px 6px; margin-left:6px; }
  .editbtn { background:none; border:none; color:var(--accent); text-decoration:underline; padding:0; font-size:.85em; }
  .editor { margin-top:8px; padding:8px; border-top:1px dashed var(--line); display:none; }
  .editor.open { display:block; }
  .editor label { display:block; font-size:.8em; color:var(--muted); margin-top:6px; }
  .editor input[type=text] { width:100%; padding:6px 8px; border:1px solid var(--line); border-radius:6px; }
  .editor .optline { display:flex; gap:6px; align-items:center; margin-top:4px; }
  .editor .optline input[type=radio] { flex:0 0 auto; }
  .over { color:var(--warn); font-size:.75em; }
  .over-badge { color:var(--warn); font-size:.72em; font-weight:700; margin-left:6px; }
  .gen-note { max-width:320px; }
  #sourceControls label { font-size:.85em; color:var(--muted); margin-left:8px; }
  /* Wizard chrome */
  body { padding: 0; }
  .wizard { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; background: var(--bg); }
  .rail { background: #1a1a1a; color: #f4efe6; padding: 28px 22px; display: flex; flex-direction: column; gap: 22px; }
  .rail-brand { font-family: Georgia, "Iowan Old Style", serif; font-style: italic; font-size: 20px; letter-spacing: -0.01em; }
  .rail-step { display: grid; grid-template-columns: 28px 1fr; gap: 12px; align-items: start; padding: 4px 0; color: rgba(255,255,255,.55); cursor: pointer; background: none; border: 0; text-align: left; font: inherit; }
  .rail-step .rs-badge { width: 28px; height: 28px; border: 1px solid rgba(255,255,255,.3); border-radius: 50%; display: inline-grid; place-items: center; font-family: ui-monospace, Menlo, monospace; font-weight: 700; font-size: 12px; }
  .rail-step .rs-title { font-style: italic; font-size: 14px; margin-top: 4px; }
  .rail-step .rs-desc { font-size: 11px; color: rgba(255,255,255,.6); margin-top: 2px; line-height: 1.35; }
  .rail-step.done { color: rgba(255,255,255,.85); }
  .rail-step.done .rs-badge { background: #f4efe6; color: #1a1a1a; border-color: #f4efe6; }
  .rail-step.cur { color: #f4efe6; }
  .rail-step.cur .rs-badge { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(200,68,58,.25); }
  .rail-step[disabled] { cursor: not-allowed; opacity: .5; }
  .rail-dest { margin-top: auto; padding-top: 18px; border-top: 1px solid rgba(255,255,255,.12); }
  .rail-dest .dl { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: rgba(255,255,255,.55); font-weight: 700; margin-bottom: 6px; }
  .rail-dest select { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,.2); background: #2a2a2a; color: #f4efe6; font: inherit; }
  .stage { padding: 32px 40px 48px; overflow-x: hidden; }
  .stage h2 { font-family: Georgia, "Iowan Old Style", serif; font-style: italic; font-weight: 500; font-size: 26px; letter-spacing: -0.01em; margin: 0 0 6px; }
  .stage .lede { color: var(--muted); margin: 0 0 24px; font-size: 14px; max-width: 60ch; }
  .step-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 28px; padding-top: 18px; border-top: 1px solid var(--line); }
</style>
</head>
<body>
<div class="wizard">
  <nav class="rail">
    <div class="rail-brand">Exporter &mdash;</div>
    <button class="rail-step" data-go="0">
      <span class="rs-badge">0</span>
      <span><div class="rs-title">Unit</div><div class="rs-desc rs-desc-unit">(none)</div></span>
    </button>
    <button class="rail-step" data-go="1">
      <span class="rs-badge">1</span>
      <span><div class="rs-title">Source</div><div class="rs-desc rs-desc-source">Pick what to export.</div></span>
    </button>
    <button class="rail-step" data-go="2">
      <span class="rs-badge">2</span>
      <span><div class="rs-title">Refine</div><div class="rs-desc">Select, edit, filter.</div></span>
    </button>
    <button class="rail-step" data-go="3">
      <span class="rs-badge">3</span>
      <span><div class="rs-title">Send</div><div class="rs-desc">Download or build.</div></span>
    </button>
    <div class="rail-dest">
      <div class="dl">Destination</div>
      <select id="destSel">
        <option value="blooket">Blooket</option>
        <option value="gimkit">GiMKit</option>
        <option value="canvas">Canvas QTI</option>
      </select>
    </div>
  </nav>

  <main class="stage">
    <section data-step="0" hidden>
      <h2>Pick a unit</h2>
      <p class="lede">Choose which unit's content to export.</p>
      <div id="unitGrid"></div>
    </section>

    <section data-step="1" hidden>
      <h2>Pick a source</h2>
      <p class="lede">Each source maps from a different pool in this unit.</p>
      <div id="sourceGrid"></div>
      <div id="sourceOpts"></div>
      <div class="step-actions">
        <button id="back1" class="secondary">&larr; Unit</button>
        <button id="next1" class="primary">Continue: Refine &rarr;</button>
      </div>
    </section>

    <section data-step="2" hidden>
      <h2>Refine selection</h2>
      <p class="lede" id="step2Lede">Pick questions to export. You can edit any of them inline.</p>

      <div class="toolbar">
        <button id="selAll" class="secondary">Select all</button>
        <button id="selNone" class="secondary">Clear</button>
        <input id="filter" type="text" placeholder="Filter by text..." style="flex:1;min-width:160px;padding:8px 10px;border:1px solid var(--line);border-radius:6px;">
        <span class="count" id="count">0 selected</span>
      </div>

      <div id="list"></div>

      <div class="step-actions">
        <button id="back2" class="secondary">&larr; Source</button>
        <button id="next2" class="primary">Continue: Send &rarr;</button>
      </div>
    </section>

    <section data-step="3" hidden>
      <h2>Send</h2>
      <p class="lede" id="step3Lede">Choose a platform and download.</p>

      <div class="toolbar">
        <label>Platform <select id="platformSel"><option value="blooket">Blooket</option><option value="gimkit">GiMKit</option></select></label>
        <button id="exportBtn" class="primary" disabled>Export CSV</button>
        <span id="genNote" class="gen-note" style="display:none;color:var(--warn);font-size:.85em;"></span>
      </div>

      <div id="canvasPanel" hidden></div>

      <div class="step-actions">
        <button id="back3" class="secondary">&larr; Refine</button>
      </div>
    </section>
  </main>
</div>

<script src="question-export-core.js"></script>
<script>
(function () {
  var UNITS_URL = '../../units/units.json';
  var stepEls = function () { return document.querySelectorAll('section[data-step]'); };
  function showStep(n) {
    state.step = n;
    stepEls().forEach(function (s) { s.hidden = (Number(s.dataset.step) !== n); });
    document.querySelectorAll('.rail-step').forEach(function (b) {
      var i = Number(b.dataset.go);
      b.classList.toggle('cur', i === n);
      b.classList.toggle('done', i < n);
    });
    if (n === 2) render();
  }
  function wireRail() {
    document.querySelectorAll('.rail-step').forEach(function (b) {
      b.onclick = function () { showStep(Number(b.dataset.go)); };
    });
    document.getElementById('back1').onclick = function () { showStep(0); };
    document.getElementById('next1').onclick = function () { showStep(2); };
    document.getElementById('back2').onclick = function () { showStep(1); };
    document.getElementById('next2').onclick = function () { showStep(3); };
    document.getElementById('back3').onclick = function () { showStep(2); };
  }
  var state = { unitId: null, source: 'practice', questions: [], selected: {}, edits: {},
                vocabDirection: 'definition-term', includeEncounter: false, fibTyped: false,
                rawConfig: null };
  state.step = 2;            // start at Step 2 to preserve current behavior until later tasks
  state.destination = 'blooket';
  state.canvasOpts = { title: '', maxAttempts: 1 };

  var el = function (tag, cls, text) { var e = document.createElement(tag); if (cls) e.className = cls; if (text != null) e.textContent = text; return e; };

  function effective(q) {
    var e = state.edits[q.id];
    if (!e) return q;
    return { id:q.id, question:e.question, options:e.options.slice(), correctIndex:e.correctIndex, topic:q.topic };
  }
  function isDirty(q) { return !!state.edits[q.id]; }

  function selectedList() {
    return state.questions.filter(function (q) { return state.selected[q.id]; }).map(effective);
  }

  function updateCount() {
    var n = Object.keys(state.selected).filter(function (k) { return state.selected[k]; }).length;
    document.getElementById('count').textContent = n + ' selected';
    document.getElementById('exportBtn').disabled = n === 0;
  }

  function render() {
    var list = document.getElementById('list');
    list.textContent = '';
    var filter = document.getElementById('filter').value.toLowerCase();
    var byTopic = {};
    var order = [];
    state.questions.forEach(function (q) {
      var eq = effective(q);
      if (filter && eq.question.toLowerCase().indexOf(filter) === -1) return;
      if (!byTopic[q.topic]) { byTopic[q.topic] = []; order.push(q.topic); }
      byTopic[q.topic].push(q);
    });
    order.forEach(function (topic) {
      var sec = el('div', 'chapter');
      sec.append(renderChapterHead(topic, byTopic[topic]));
      byTopic[topic].forEach(function (q) { sec.append(renderRow(q)); });
      list.append(sec);
    });
    updateCount();
  }

  function renderChapterHead(topic, qs) {
    var head = el('h2', 'chapter-head');
    var allSelected = qs.every(function (q) { return state.selected[q.id]; });
    var cb = el('input'); cb.type = 'checkbox'; cb.checked = allSelected;
    cb.title = allSelected ? 'Deselect all in this chapter' : 'Select all in this chapter';
    cb.onchange = function () {
      qs.forEach(function (q) { state.selected[q.id] = cb.checked; });
      render();
    };
    head.append(cb, document.createTextNode(' ' + topic));
    return head;
  }

  function renderRow(q) {
    var eq = effective(q);
    var row = el('div', 'qrow');
    var head = el('div', 'qhead');
    var cb = el('input'); cb.type = 'checkbox'; cb.checked = !!state.selected[q.id];
    cb.onchange = function () { state.selected[q.id] = cb.checked; updateCount(); };
    var txt = el('div', 'qtext'); txt.append(document.createTextNode(eq.question));
    if (isDirty(q)) txt.append(el('span', 'badge', 'edited'));
    var edit = el('button', 'editbtn', 'edit');
    var editor = el('div', 'editor');
    edit.onclick = function () { editor.classList.toggle('open'); };
    head.append(cb, txt, edit);
    row.append(head, buildEditor(q, editor));
    return row;
  }

  function buildEditor(q, editor) {
    var eq = effective(q);
    editor.textContent = '';
    editor.append(el('label', null, 'Question'));
    var qIn = el('input'); qIn.type = 'text'; qIn.value = eq.question;
    editor.append(qIn);
    var optInputs = [];
    eq.options.forEach(function (opt, idx) {
      var line = el('div', 'optline');
      var radio = el('input'); radio.type = 'radio'; radio.name = 'correct-' + q.id; radio.checked = idx === eq.correctIndex;
      var oin = el('input'); oin.type = 'text'; oin.value = opt; oin.style.flex = '1';
      line.append(radio, oin);
      if ((opt || '').length > 100) {
        line.append(el('span', 'over-badge', opt.length + ' chars'));
      }
      editor.append(line);
      optInputs.push({ radio: radio, input: oin });
    });
    var save = el('button', 'secondary', 'Apply edit'); save.style.marginTop = '8px';
    save.onclick = function () {
      var ci = 0; optInputs.forEach(function (o, i) { if (o.radio.checked) ci = i; });
      state.edits[q.id] = { question: qIn.value, options: optInputs.map(function (o) { return o.input.value; }), correctIndex: ci };
      render();
    };
    editor.append(save);
    return editor;
  }

  function loadUnit(unitId) {
    state.unitId = unitId; state.selected = {}; state.edits = {};
    fetch('../../units/' + unitId + '/config.json')
      .then(function (r) { return r.json(); })
      .then(function (cfg) { state.rawConfig = cfg; rebuildQuestions(); })
      .catch(function (e) { document.getElementById('list').textContent = 'Could not load unit: ' + e; });
  }

  function rebuildQuestions() {
    state.selected = {}; state.edits = {};
    var cfg = state.rawConfig;
    if (!cfg) { state.questions = []; }
    else if (state.source === 'fib') state.questions = window.QExport.normalizeFib(cfg);
    else if (state.source === 'vocab') state.questions = window.QExport.normalizeVocab(cfg, { direction: state.vocabDirection, includeEncounter: state.includeEncounter });
    else state.questions = window.QExport.normalizeQuestions(cfg);
    renderSourceControls();
    render();
    var note = document.getElementById('genNote');
    if (state.source === 'practice') { note.style.display = 'none'; }
    else { note.style.display = ''; note.textContent = 'Wrong answers are auto-generated from the same chapter. Review or edit them before exporting.'; }
  }

  function renderSourceControls() {
    var c = document.getElementById('sourceControls');
    if (!c) return; // Step 1 stub will provide source options later
    c.textContent = '';
    if (state.source === 'vocab') {
      var dirLabel = el('label', null, 'Direction ');
      var dir = el('select');
      [['definition-term','Definition to Term'],['term-definition','Term to Definition']].forEach(function (o) {
        var op = el('option', null, o[1]); op.value = o[0]; if (o[0] === state.vocabDirection) op.selected = true; dir.append(op);
      });
      dir.onchange = function () { state.vocabDirection = dir.value; rebuildQuestions(); };
      dirLabel.append(dir);
      var tierLabel = el('label', null, ' ');
      var tier = el('input'); tier.type = 'checkbox'; tier.checked = state.includeEncounter;
      tier.onchange = function () { state.includeEncounter = tier.checked; rebuildQuestions(); };
      tierLabel.append(tier, document.createTextNode(' Include encounter tier'));
      c.append(dirLabel, tierLabel);
    } else if (state.source === 'fib') {
      var typedLabel = el('label', null, ' ');
      var typed = el('input'); typed.type = 'checkbox'; typed.checked = state.fibTyped;
      typed.onchange = function () { state.fibTyped = typed.checked; };
      typedLabel.append(typed, document.createTextNode(' Typed answers (GiMKit only)'));
      c.append(typedLabel);
    }
  }

  function doExport() {
    var platform = document.getElementById('platformSel').value;
    var qs = selectedList();
    var csv, suffix;
    if (state.source === 'fib' && state.fibTyped && platform === 'gimkit') {
      csv = window.QExport.formatGimkitTyped(qs); suffix = 'gimkit-typed';
    } else {
      csv = platform === 'gimkit' ? window.QExport.formatGimkit(qs) : window.QExport.formatBlooket(qs);
      suffix = platform;
    }
    var sourceName = state.source === 'fib' ? 'fib' : (state.source === 'vocab' ? 'vocabulary' : 'practice');
    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = state.unitId + '-' + sourceName + '-' + suffix + '.csv';
    document.body.append(a); a.click(); a.remove();
    URL.revokeObjectURL(a.href);
  }

  document.getElementById('selAll').onclick = function () { state.questions.forEach(function (q) { state.selected[q.id] = true; }); render(); };
  document.getElementById('selNone').onclick = function () { state.selected = {}; render(); };
  document.getElementById('filter').oninput = render;
  document.getElementById('exportBtn').onclick = doExport;

  document.getElementById('destSel').onchange = function () { state.destination = this.value; updatePlatformVisibility(); };
  function updatePlatformVisibility() {
    var platSel = document.getElementById('platformSel');
    platSel.disabled = (state.destination === 'canvas');
    document.getElementById('exportBtn').hidden = (state.destination === 'canvas');
  }
  wireRail();
  showStep(state.step);
  fetch(UNITS_URL).then(function (r) { return r.json(); }).then(function (data) {
    state.units = (data.units || []);
    if (state.units.length) loadUnit(state.units[0].id);
  });
  updatePlatformVisibility();
})();
</script>
</body>
</html>
