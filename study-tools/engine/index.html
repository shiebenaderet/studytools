<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tool</title>
    <link rel="stylesheet" href="vendor/font-awesome.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div id="loading-screen" style="text-align: center; padding: 60px 20px;">
            <i class="fas fa-spinner fa-spin" style="font-size: 3em; color: var(--text-primary);"></i>
            <p style="margin-top: 16px; color: var(--text-secondary); font-size: 1.1em;">Loading study tool...</p>
        </div>
        <header id="site-header">
            <h1 id="site-title"><i class="fas fa-book-open"></i> <span id="title-text">Loading...</span></h1>
            <div class="subtitle" id="site-subtitle"></div>
            <div class="essential-question" id="site-question"></div>
        </header>

        <nav id="main-nav" class="nav-tabs"></nav>

        <div id="activity-topbar" class="activity-topbar"></div>

        <div id="sub-nav" class="sub-nav"></div>

        <div id="home-section" class="section active">
            <div class="stats-container" id="stats-container"></div>
            <div class="home-cards" id="home-cards"></div>
        </div>

        <div id="activity-container" class="section"></div>

        <div id="modal-overlay" class="modal"></div>

        <footer class="app-footer" id="app-footer"></footer>

        <div id="login-prompt" class="login-prompt hidden">
            <button class="save-progress-btn" onclick="StudyEngine.showLoginModal()">
                <i class="fas fa-save"></i> Save Progress
            </button>
        </div>
    </div>

    <!-- Settings gear button -->
    <button class="settings-fab" id="settings-fab" title="Settings" aria-label="Open settings">
        <i class="fas fa-cog" id="settings-fab-icon"></i>
    </button>

    <!-- Settings panel -->
    <div class="settings-panel" id="settings-panel">
        <div class="settings-panel-header">
            <span class="settings-panel-title">Settings</span>
            <button class="settings-panel-close" id="settings-panel-close" aria-label="Close settings">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="settings-panel-body">
            <button class="settings-row" id="settings-theme" aria-label="Toggle light and dark mode">
                <span class="settings-row-icon"><i class="fas fa-sun" id="theme-icon"></i></span>
                <span class="settings-row-label" id="theme-label">Dark Mode</span>
                <span class="settings-row-toggle" id="theme-toggle-indicator"></span>
            </button>
            <button class="settings-row" id="settings-dyslexic" aria-label="Toggle dyslexic-friendly font">
                <span class="settings-row-icon"><i class="fas fa-font"></i></span>
                <span class="settings-row-label">Dyslexic-Friendly Font</span>
                <span class="settings-row-toggle" id="dyslexic-toggle-indicator"></span>
            </button>
            <button class="settings-row" id="settings-search" aria-label="Open search">
                <span class="settings-row-icon"><i class="fas fa-search"></i></span>
                <span class="settings-row-label">Search & Commands</span>
                <span class="settings-row-shortcut"><kbd>/</kbd></span>
            </button>
        </div>
    </div>
    <div class="settings-backdrop" id="settings-backdrop"></div>

    <script src="vendor/supabase-js.min.js"></script>
    <script src="js/core/supabase-config.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/core/progress.js"></script>
    <script src="js/core/achievements.js"></script>
    <script src="js/core/leaderboard.js"></script>
    <script src="js/core/mastery.js"></script>
    <script src="js/core/command-palette.js"></script>
    <script src="tools/tools.js"></script>
    <script src="js/core/app.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    }
    </script>
    <script>
    (function() {
        var panel = document.getElementById('settings-panel');
        var fab = document.getElementById('settings-fab');
        var fabIcon = document.getElementById('settings-fab-icon');
        var backdrop = document.getElementById('settings-backdrop');
        var closeBtn = document.getElementById('settings-panel-close');
        var themeIcon = document.getElementById('theme-icon');
        var themeLabel = document.getElementById('theme-label');
        var themeIndicator = document.getElementById('theme-toggle-indicator');
        var dyslexicIndicator = document.getElementById('dyslexic-toggle-indicator');

        function isOpen() { return panel.classList.contains('open'); }

        function openPanel() {
            panel.classList.add('open');
            backdrop.classList.add('open');
            fabIcon.className = 'fas fa-times';
        }
        function closePanel() {
            panel.classList.remove('open');
            backdrop.classList.remove('open');
            fabIcon.className = 'fas fa-cog';
        }

        fab.addEventListener('click', function() { isOpen() ? closePanel() : openPanel(); });
        backdrop.addEventListener('click', closePanel);
        closeBtn.addEventListener('click', closePanel);

        // --- Theme ---
        function updateThemeUI() {
            var isLight = document.body.classList.contains('light-mode');
            themeIcon.className = isLight ? 'fas fa-moon' : 'fas fa-sun';
            themeLabel.textContent = isLight ? 'Light Mode' : 'Dark Mode';
            themeIndicator.classList.toggle('on', !isLight);
        }
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }
        updateThemeUI();

        document.getElementById('settings-theme').addEventListener('click', function() {
            document.body.classList.toggle('light-mode');
            var isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            updateThemeUI();
        });

        // --- Dyslexic font ---
        function updateDyslexicUI() {
            var isOn = document.body.classList.contains('dyslexic-font');
            dyslexicIndicator.classList.toggle('on', isOn);
        }
        if (localStorage.getItem('dyslexic-font') === 'on') {
            document.body.classList.add('dyslexic-font');
        }
        updateDyslexicUI();

        document.getElementById('settings-dyslexic').addEventListener('click', function() {
            document.body.classList.toggle('dyslexic-font');
            var isOn = document.body.classList.contains('dyslexic-font');
            localStorage.setItem('dyslexic-font', isOn ? 'on' : 'off');
            updateDyslexicUI();
        });

        // --- Search shortcut ---
        document.getElementById('settings-search').addEventListener('click', function() {
            closePanel();
            setTimeout(function() {
                if (typeof CommandPalette !== 'undefined') CommandPalette.open();
            }, 200);
        });
    })();
    </script>
</body>
</html>
