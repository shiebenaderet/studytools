<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tool</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div id="loading-screen" style="text-align: center; padding: 60px 20px;">
            <i class="fas fa-spinner fa-spin" style="font-size: 3em; color: var(--text-primary);"></i>
            <p style="margin-top: 16px; color: var(--text-secondary); font-size: 1.1em;">Loading study tool...</p>
        </div>
        <header id="site-header">
            <h1 id="site-title"><i class="fas fa-book-open"></i> <span id="title-text">Loading...</span></h1>
            <div class="subtitle" id="site-subtitle"></div>
            <div class="essential-question" id="site-question"></div>
        </header>

        <nav id="main-nav" class="nav-tabs"></nav>

        <div id="activity-topbar" class="activity-topbar"></div>

        <div id="sub-nav" class="sub-nav"></div>

        <div id="home-section" class="section active">
            <div class="stats-container" id="stats-container"></div>
            <div class="home-cards" id="home-cards"></div>
        </div>

        <div id="activity-container" class="section"></div>

        <div id="modal-overlay" class="modal"></div>

        <footer class="app-footer" id="app-footer"></footer>

        <div id="login-prompt" class="login-prompt hidden">
            <button class="save-progress-btn" onclick="StudyEngine.showLoginModal()">
                <i class="fas fa-save"></i> Save Progress
            </button>
        </div>
    </div>

    <button class="cmd-palette-btn" id="cmd-palette-btn" title="Command palette (/ or Cmd+K)">
        <i class="fas fa-search"></i>
    </button>

    <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode">
        <i class="fas fa-sun" id="theme-icon"></i>
    </button>

    <button class="dyslexic-toggle" id="dyslexic-toggle" title="Toggle dyslexic-friendly font">
        <i class="fas fa-font"></i> <span id="dyslexic-label">Aa</span>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/core/supabase-config.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/core/progress.js"></script>
    <script src="js/core/achievements.js"></script>
    <script src="js/core/mastery.js"></script>
    <script src="js/core/command-palette.js"></script>
    <script src="tools/tools.js"></script>
    <script src="js/core/app.js"></script>
    <script>
    (function() {
        // Theme toggle (light/dark)
        var themeBtn = document.getElementById('theme-toggle');
        var themeIcon = document.getElementById('theme-icon');
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
            themeIcon.className = 'fas fa-moon';
        }
        themeBtn.addEventListener('click', function() {
            var isLight = document.body.classList.toggle('light-mode');
            themeIcon.className = isLight ? 'fas fa-moon' : 'fas fa-sun';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        });

        // Dyslexic font toggle
        var toggle = document.getElementById('dyslexic-toggle');
        var label = document.getElementById('dyslexic-label');
        if (localStorage.getItem('dyslexic-font') === 'on') {
            document.body.classList.add('dyslexic-font');
            toggle.classList.add('active');
            label.textContent = 'Aa ✓';
        }
        toggle.addEventListener('click', function() {
            var isOn = document.body.classList.toggle('dyslexic-font');
            toggle.classList.toggle('active', isOn);
            label.textContent = isOn ? 'Aa ✓' : 'Aa';
            localStorage.setItem('dyslexic-font', isOn ? 'on' : 'off');
        });
    })();
    </script>
</body>
</html>
